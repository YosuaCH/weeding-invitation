<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weeding Invite</title>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- opentype -->
    <script src="https://cdn.jsdelivr.net/npm/opentype.js/dist/opentype.min.js"></script>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Global CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <!-- Scripts -->
    <script src="assets/js/hero_text_animation.js" defer></script>
    <script src="assets/js/audio.js" defer></script>
  </head>
  <body class="bg-black text-white font-sans overflow-hidden">
    <!-- Hero Section -->
    <section class="relative h-screen w-full flex items-center justify-center">
      <!-- Background Video -->
      <div class="absolute inset-0">
        <video playsinline autoplay muted class="w-full h-full object-cover">
          <source src="assets/video/flower.mp4" type="video/mp4" />
        </video>
        <!-- Overlay -->
        <div class="absolute inset-0 bg-black/40"></div>
      </div>

      <!-- Content  -->
      <div class="relative z-10 text-center px-4 w-full max-w-4xl">
        <p
          id="sub-title"
          class="opacity-0 text-white tracking-[0.3em] text-sm md:text-base mb-4"
        >
          THE WEDDING OF
        </p>

        <div id="name-wrapper" class="opacity-0">
          <svg
            id="name"
            class="w-[clamp(280px,72vw,640px)] h-auto overflow-visible block mx-auto"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 640 160"
          >
            <defs>
              <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="3" result="b" />
                <feMerge>
                  <feMergeNode in="b" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
          </svg>
        </div>

        <!-- Divider -->
        <div
          id="line"
          class="w-0 h-[1px] bg-white mx-auto my-5 opacity-50"
        ></div>

        <p
          id="date"
          class="opacity-0 text-white tracking-[0.25em] text-xs md:text-sm"
        >
          25 . 12 . 2026
        </p>
      </div>
    </section>

    <!-- Music Toggle Button -->
    <button
      id="music_toggle"
      class="paused fixed bottom-6 right-6 z-50 flex items-center gap-3 bg-transparent group outline-none"
    >
      <div
        class="relative flex items-center justify-center w-10 h-10 rounded-full bg-black/40 border border-white/20 backdrop-blur-md shadow-lg overflow-hidden"
      >
        <!-- Music Disc -->
        <svg
          class="vinyl-icon w-5 h-5 text-white/90"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
        >
          <circle
            cx="12"
            cy="12"
            r="9"
            stroke="currentColor"
            stroke-width="2"
          />
          <circle
            cx="12"
            cy="12"
            r="3"
            stroke="currentColor"
            fill="currentColor"
          />
          <path
            d="M12 3v3m0 12v3m9-9h-3M6 12H3m13.364-6.364l-2.121 2.121m-8.486 8.486l-2.121 2.121m12.728 0l-2.121-2.121M6.343 6.343l2.121 2.121"
            stroke-width="1"
            opacity="0.5"
          />
        </svg>
      </div>

      <!-- Efek Sound Wave & Label -->
      <div class="flex flex-col items-start justify-center gap-1">
        <svg
          id="audio-wave"
          width="60"
          height="20"
          viewBox="0 0 60 20"
          class="overflow-visible"
        >
          <path
            id="wave-path"
            d="M 0 10 L 60 10"
            fill="none"
            stroke="white"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span
          class="text-[9px] text-white/70 tracking-widest font-light"
          id="music_label"
          >SOUND OFF</span
        >
      </div>
    </button>

    <!--Audio -->
    <audio id="bg-music" loop>
      <source
        src="assets/audio/Christina Perri - A Thousand Years Piano.mp3"
        type="audio/mpeg"
      />
    </audio>
  </body>
</html>
